# nginx reverse proxy for the VPS inference server.
# HTTP-only config — no TLS for now since we don't have a domain.
# The backend (Vercel) calls this server directly over HTTP.

server {
    listen 80;
    server_name _;   # match any hostname / bare IP

    # Increase timeouts for long-running inference requests
    proxy_read_timeout    600s;
    proxy_send_timeout    600s;
    proxy_connect_timeout 30s;

    client_max_body_size 2G;   # satellite TIFs can reach 1.2 GB

    location / {
        proxy_pass         http://inference:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # WebSocket upgrade support
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }
}
